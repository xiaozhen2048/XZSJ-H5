<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>小镇刷题家 — 学习方法</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Sticky Page Header -->
<div class="page-header">
  <a href="home.html" class="back-btn">
    <svg><use href="assets/icons.svg#icon-arrow-left"/></svg>
  </a>
  <div class="title">学习方法</div>
</div>

<!-- Page Content -->
<div class="page-content">

  <!-- Content Area -->
  <div id="contentArea" style="display:none;background:var(--color-surface);border-radius:var(--radius-md);padding:var(--space-lg) var(--space-xl);box-shadow:var(--shadow-card);line-height:1.8;"></div>

  <!-- Skeleton -->
  <div id="skeletonState">
    <div class="skeleton" style="height:16px;margin-bottom:var(--space-md);border-radius:4px;"></div>
    <div class="skeleton" style="height:16px;margin-bottom:var(--space-md);border-radius:4px;width:80%;"></div>
    <div class="skeleton" style="height:16px;margin-bottom:var(--space-md);border-radius:4px;width:90%;"></div>
    <div class="skeleton" style="height:16px;margin-bottom:var(--space-md);border-radius:4px;"></div>
    <div class="skeleton" style="height:16px;border-radius:4px;width:60%;"></div>
  </div>

  <!-- Error State -->
  <div id="errorState" style="display:none;text-align:center;padding:var(--space-3xl) var(--space-lg);">
    <p id="errorMsg" style="color:var(--color-text-secondary);margin-bottom:var(--space-lg);line-height:1.5;"></p>
    <button class="btn btn-outline btn-sm" id="retryBtn">重试</button>
  </div>

  <!-- Empty State -->
  <div id="emptyState" style="display:none;text-align:center;padding:var(--space-3xl) var(--space-lg);">
    <p style="color:var(--color-text-muted);">暂无内容</p>
  </div>

</div>

<script src="js/config.js"></script>
<script src="js/theme.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>

<script>
(function () {
  'use strict';

  function escapeHTML(str) {
    if (!str) return '';
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  // DOM references
  var contentArea  = document.getElementById('contentArea');
  var skeletonState = document.getElementById('skeletonState');
  var errorState   = document.getElementById('errorState');
  var errorMsg     = document.getElementById('errorMsg');
  var emptyState   = document.getElementById('emptyState');
  var retryBtn     = document.getElementById('retryBtn');

  function showSkeleton() {
    contentArea.style.display = 'none';
    skeletonState.style.display = '';
    errorState.style.display = 'none';
    emptyState.style.display = 'none';
  }

  function hideSkeleton() {
    skeletonState.style.display = 'none';
  }

  function showError(msg) {
    contentArea.style.display = 'none';
    skeletonState.style.display = 'none';
    errorState.style.display = '';
    emptyState.style.display = 'none';
    errorMsg.textContent = msg || '加载失败，请检查网络连接';
  }

  function showEmpty() {
    contentArea.style.display = 'none';
    skeletonState.style.display = 'none';
    errorState.style.display = 'none';
    emptyState.style.display = '';
  }

  /*
   * Detect if a line starts with a numbered heading pattern.
   * Matches patterns like "1、", "2、", "1.", "2.", "（一）", "一、", etc.
   */
  function isHeadingLine(line) {
    return /^\s*(?:\d+[、.．]|[（(]?\d+[)）][、.]?|[一二三四五六七八九十]+[、.]|[（(][一二三四五六七八九十]+[)）])\s*/.test(line);
  }

  function renderContent(text) {
    hideSkeleton();

    if (!text || text.trim().length === 0) {
      showEmpty();
      return;
    }

    // Split by newlines
    var lines = text.split(/\r?\n/);
    var html = '';

    for (var i = 0; i < lines.length; i++) {
      var line = lines[i].trim();
      if (line.length === 0) {
        // Empty line: add spacing
        html += '<div style="height:var(--space-md);"></div>';
        continue;
      }

      if (isHeadingLine(line)) {
        html += '<h3 style="font-family:var(--font-heading);font-size:var(--font-size-base);' +
                'font-weight:var(--font-weight-semibold);line-height:1.5;margin-bottom:var(--space-sm);' +
                'color:var(--color-text);padding-top:var(--space-md);">' +
                escapeHTML(line) + '</h3>';
      } else {
        html += '<p style="font-size:var(--font-size-sm);color:var(--color-text-secondary);' +
                'line-height:1.8;margin-bottom:var(--space-sm);">' +
                escapeHTML(line) + '</p>';
      }
    }

    contentArea.innerHTML = html;
    contentArea.style.display = '';
  }

  function loadContent() {
    showSkeleton();

    API.getCourses()
      .then(function (data) {
        var text = (data && data.learningMethod) ? data.learningMethod : '';
        renderContent(text);
      })
      .catch(function (err) {
        hideSkeleton();
        showError(err.message || '加载失败，请检查网络连接');
      });
  }

  // Retry
  retryBtn.addEventListener('click', function () {
    loadContent();
  });

  loadContent();

})();
</script>

</body>
</html>
