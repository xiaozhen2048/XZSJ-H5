<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>小镇刷题家 — 课程</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Sticky Page Header -->
<div class="page-header">
  <a href="home.html" class="back-btn">
    <svg><use href="assets/icons.svg#icon-arrow-left"/></svg>
  </a>
  <svg id="pageIcon" width="22" height="22" style="flex-shrink:0;display:none;">
    <use id="pageIconUse" href="assets/icons.svg#icon-mic"/>
  </svg>
  <div class="title" id="pageTitle">课程</div>
</div>

<!-- Page Content -->
<div class="page-content">

  <!-- Course List -->
  <div id="courseList" style="display:flex;flex-direction:column;gap:var(--space-md);">
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-card"></div>
  </div>

  <!-- Error State -->
  <div id="errorState" style="display:none;text-align:center;padding:var(--space-3xl) var(--space-lg);">
    <p id="errorMsg" style="color:var(--color-text-secondary);margin-bottom:var(--space-lg);line-height:1.5;"></p>
    <button class="btn btn-outline btn-sm" id="retryBtn">重试</button>
  </div>

  <!-- Empty State -->
  <div id="emptyState" style="display:none;text-align:center;padding:var(--space-3xl) var(--space-lg);">
    <p style="color:var(--color-text-muted);">该科目暂无课程</p>
  </div>

</div>

<script src="js/config.js"></script>
<script src="js/theme.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>

<script>
(function () {
  'use strict';

  /*
   * Escape HTML special characters to prevent XSS.
   * Creates a text node to leverage the browser's built-in escaping.
   */
  function escapeHTML(str) {
    if (!str) return '';
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  /*
   * Map a category title to its corresponding SVG icon name.
   *   "数量" -> icon-math
   *   "资料" -> icon-chart
   *   "判断" -> icon-brain
   *   all others -> icon-mic
   */
  var iconMap = {
    '数量关系': 'icon-math',
    '资料分析': 'icon-chart',
    '判断推理': 'icon-brain'
  };

  function getCategoryIcon(title) {
    var t = title || '';
    if (t.indexOf('数量') !== -1) return 'icon-math';
    if (t.indexOf('资料') !== -1) return 'icon-chart';
    if (t.indexOf('判断') !== -1) return 'icon-brain';
    return 'icon-mic';
  }

  /*
   * Global video click handler called from onclick attributes.
   * Checks preview mode, validates URL, and opens the video.
   */
  window.handleVideoClick = function (e, url, password, isPreview) {
    if (isPreview) {
      App.toast('预览模式，激活后可观看');
      return;
    }
    if (!url) {
      App.toast('链接暂未上传');
      return;
    }
    App.openVideo(url, password);
  };

  // -----------------------------------------------------------------------
  // DOM references
  // -----------------------------------------------------------------------
  var courseList  = document.getElementById('courseList');
  var errorState  = document.getElementById('errorState');
  var errorMsg    = document.getElementById('errorMsg');
  var emptyState  = document.getElementById('emptyState');
  var retryBtn    = document.getElementById('retryBtn');
  var pageTitle   = document.getElementById('pageTitle');
  var pageIcon    = document.getElementById('pageIcon');
  var pageIconUse = document.getElementById('pageIconUse');

  // -----------------------------------------------------------------------
  // State management: skeleton / error / empty / content
  // -----------------------------------------------------------------------
  function showSkeleton() {
    courseList.style.display = '';
    errorState.style.display = 'none';
    emptyState.style.display = 'none';

    courseList.innerHTML = '';
    for (var i = 0; i < 3; i++) {
      var skel = document.createElement('div');
      skel.className = 'skeleton skeleton-card';
      courseList.appendChild(skel);
    }
  }

  function hideSkeleton() {
    courseList.innerHTML = '';
  }

  function showError(msg) {
    courseList.style.display = 'none';
    errorState.style.display = '';
    emptyState.style.display = 'none';
    errorMsg.textContent = msg || '加载失败，请返回重试';
  }

  function showEmpty() {
    courseList.style.display = 'none';
    errorState.style.display = 'none';
    emptyState.style.display = '';
  }

  // -----------------------------------------------------------------------
  // Normalize API response to a flat array of category objects
  // -----------------------------------------------------------------------
  function getCategoryList(data) {
    if (Array.isArray(data)) return data;
    if (data && Array.isArray(data.categories)) return data.categories;
    if (data && Array.isArray(data.courses)) return data.courses;
    return [];
  }

  /*
   * Find a category by its id (checks both _id and id fields).
   * Returns the matching category object or null.
   */
  function findCategory(categories, targetId) {
    for (var i = 0; i < categories.length; i++) {
      var c = categories[i];
      var cid = (c._id || c.id || '').toString();
      if (cid === targetId) return c;
    }
    return null;
  }

  // -----------------------------------------------------------------------
  // Render course cards for a given category
  // -----------------------------------------------------------------------
  function renderCourses(category) {
    hideSkeleton();

    var catName = category.name || category.title || '课程';
    var courses = category.courses || [];

    // Update page header
    pageTitle.textContent = catName;
    var headerIcon = getCategoryIcon(catName);
    pageIconUse.setAttribute('href', 'assets/icons.svg#' + headerIcon);
    pageIcon.style.display = '';

    // Check for empty courses
    if (!courses.length || courses.length === 0) {
      showEmpty();
      return;
    }

    courseList.style.display = '';
    courseList.innerHTML = '';

    for (var i = 0; i < courses.length; i++) {
      var course = courses[i];
      var courseTitle = course.title || course.name || '未命名课程';
      var courseTag = course.tag || '';
      var tagClass = (courseTag === '必学') ? 'tag required' : 'tag';
      var videos = course.videos || [];
      var videoCount = videos.length;

      // Build course header HTML
      var tagHTML = '';
      if (courseTag) {
        tagHTML = '<span class="' + tagClass + '">' + escapeHTML(courseTag) + '</span>';
      }

      var metaHTML = '';
      var metaParts = [];
      if (courseTag) {
        metaParts.push(tagHTML);
      }
      if (videoCount > 0) {
        metaParts.push(videoCount + '个视频');
      }
      if (metaParts.length > 0) {
        metaHTML = metaParts.join(' ');
      }

      // Build video capsules HTML
      var videosHTML = '';
      if (videoCount > 0) {
        for (var v = 0; v < videos.length; v++) {
          var video = videos[v];
          var vLabel = video.label || video.title || '视频 ' + (v + 1);
          var vUrl = video.url || '';
          var vPassword = video.password || video.pwd || '';
          var isPreview = Auth.isPreview();

          // Build onclick for capsule body
          var capsuleOnClick = '';
          if (isPreview) {
            capsuleOnClick = "App.toast('预览模式，激活后可观看')";
          } else if (!vUrl) {
            capsuleOnClick = "App.toast('链接暂未上传')";
          } else {
            capsuleOnClick = "handleVideoClick(event, '" +
              escapeHTML(vUrl).replace(/'/g, "\\'") + "', '" +
              escapeHTML(vPassword).replace(/'/g, "\\'") + "', false)";
          }

          var passwordBadgeHTML = '';
          if (vPassword) {
            var badgeOnClick = "event.stopPropagation();App.copy('" +
              escapeHTML(vPassword).replace(/'/g, "\\'") + "')";
            passwordBadgeHTML = '<div class="password-badge" onclick="' + badgeOnClick + '">' +
              '<svg width="12" height="12" style="margin-right:2px;display:inline;vertical-align:middle;">' +
              '<use href="assets/icons.svg#icon-copy"/>' +
              '</svg>' +
              escapeHTML(vPassword) +
              '</div>';
          }

          videosHTML +=
            '<div class="video-capsule" onclick="' + capsuleOnClick + '">' +
              '<div class="play-icon">' +
                '<svg><use href="assets/icons.svg#icon-play"/></svg>' +
              '</div>' +
              '<div class="video-label">' + escapeHTML(vLabel) + '</div>' +
              passwordBadgeHTML +
            '</div>';
        }
      }

      // Build full course card HTML
      var cardHTML =
        '<div class="course-card">' +
          '<div class="course-header" onclick="this.parentElement.classList.toggle(\'expanded\')">' +
            '<div class="course-icon">' +
              '<svg><use href="assets/icons.svg#icon-play"/></svg>' +
            '</div>' +
            '<div class="course-info">' +
              '<div class="course-title">' + escapeHTML(courseTitle) + '</div>' +
              (metaHTML ? '<div class="course-meta">' + metaHTML + '</div>' : '') +
            '</div>' +
            '<div class="expand-icon">' +
              '<svg><use href="assets/icons.svg#icon-chevron-down"/></svg>' +
            '</div>' +
          '</div>' +
          (videosHTML ? '<div class="video-capsules">' + videosHTML + '</div>' : '') +
        '</div>';

      courseList.insertAdjacentHTML('beforeend', cardHTML);
    }
  }

  // -----------------------------------------------------------------------
  // Fetch courses from API and render the matching category
  // -----------------------------------------------------------------------
  function loadCourses() {
    var catId = App.getParam('cat');

    if (!catId) {
      showError('缺少科目参数，请返回重试');
      return;
    }

    showSkeleton();

    API.getCourses()
      .then(function (data) {
        var categories = getCategoryList(data);

        if (categories.length === 0) {
          showEmpty();
          return;
        }

        var category = findCategory(categories, catId);

        if (!category) {
          showError('科目不存在，请返回重试');
          return;
        }

        renderCourses(category);
      })
      .catch(function (err) {
        hideSkeleton();
        showError(err.message || '加载失败，请返回重试');
      });
  }

  // -----------------------------------------------------------------------
  // Retry button
  // -----------------------------------------------------------------------
  retryBtn.addEventListener('click', function () {
    loadCourses();
  });

  // -----------------------------------------------------------------------
  // Initialize
  // -----------------------------------------------------------------------
  // Auth guard is handled by App.init() on DOMContentLoaded.
  // Load courses immediately; auth redirect (if needed) wins the race.
  loadCourses();

})();
</script>

</body>
</html>
