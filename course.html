<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>小镇刷题家 — 课程</title>
  <link rel="stylesheet" href="css/style.css?v=1780643071">
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" style="display:none;">

  <symbol id="icon-arrow-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>
  </symbol>
  <symbol id="icon-chevron-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M6 9l6 6 6-6"/>
  </symbol>
  <symbol id="icon-play" viewBox="0 0 24 24" fill="currentColor" stroke="none">
    <path d="M8 5.14v14l11-7-11-7z"/>
  </symbol>
  <symbol id="icon-copy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
  </symbol>
  <symbol id="icon-lock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
  </symbol>
  <symbol id="icon-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="20 6 9 17 4 12"/>
  </symbol>
  <symbol id="icon-math" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 19h16"/><path d="M4 14h16"/><path d="M4 9h16"/><path d="M9 4h1"/><path d="M14 4h1"/>
  </symbol>
  <symbol id="icon-chart" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
  </symbol>
  <symbol id="icon-brain" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 3a3 3 0 0 0-3 3c0 1.5-.5 2-1 3a5 5 0 0 0 0 6 3 3 0 0 0 4 3 3 3 0 0 0 4-3 5 5 0 0 0 0-6c-.5-1-1-1.5-1-3a3 3 0 0 0-3-3z"/>
    <path d="M9 9a3 3 0 0 0-3 3v1c0 1-.5 1.5-1 2.5a4 4 0 0 0 0 5 2.5 2.5 0 0 0 5 0"/>
    <path d="M15 9a3 3 0 0 1 3 3v1c0 1 .5 1.5 1 2.5a4 4 0 0 1 0 5 2.5 2.5 0 0 1-5 0"/>
  </symbol>
  <symbol id="icon-mic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
    <line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
  </symbol>
  <symbol id="icon-book" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
  </symbol>
  <symbol id="icon-edit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
  </symbol>
  <symbol id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="5"/>
    <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
    <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
  </symbol>
  <symbol id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
  </symbol>

</svg>

<!-- Sticky Page Header -->
<div class="page-header">
  <a href="home.html" class="back-btn">
    <svg><use href="#icon-arrow-left"/></svg>
  </a>
  <svg id="pageIcon" width="22" height="22" style="flex-shrink:0;display:none;">
    <use id="pageIconUse" href="#icon-mic"/>
  </svg>
  <div class="title" id="pageTitle" style="flex:1;">课程</div>
  
</div>

<!-- Page Content -->
<div class="page-content">

  <div id="courseList" style="display:flex;flex-direction:column;gap:var(--space-md);">
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-card"></div>
  </div>

  <div id="errorState" style="display:none;text-align:center;padding:var(--space-3xl) var(--space-lg);">
    <p id="errorMsg" style="color:var(--color-text-secondary);margin-bottom:var(--space-lg);line-height:1.5;"></p>
    <button class="btn btn-outline btn-sm" id="retryBtn" onclick="location.reload()">重试</button>
  </div>

  <div id="emptyState" style="display:none;text-align:center;padding:var(--space-3xl) var(--space-lg);">
    <p style="color:var(--color-text-muted);">该科目暂无课程</p>
  </div>

</div>

<script src="js/config.js?v=1780643071"></script>
<script src="js/theme.js?v=1780643071"></script>
<script src="js/progress.js?v=1780643071"></script>
<script src="js/api.js?v=1780643071"></script>
<script src="js/auth.js?v=1780643071"></script>
<script src="js/app.js?v=1780643071"></script>

<script>
(function () {
  'use strict';

  // ── Utils ──────────────────────────────────────────────────
  function esc(s) {
    if (!s) return '';
    var d = document.createElement('div');
    d.appendChild(document.createTextNode(s));
    return d.innerHTML;
  }

  // HTML-escape for use inside onclick attribute strings
  function attr(s) {
    return esc(s).replace(/'/g, "\\'").replace(/"/g, '&quot;');
  }

  function getCatIcon(title) {
    var t = title || '';
    if (t.indexOf('数量') !== -1) return 'icon-math';
    if (t.indexOf('资料') !== -1) return 'icon-chart';
    if (t.indexOf('判断') !== -1) return 'icon-brain';
    return 'icon-mic';
  }

  // ── DOM refs ───────────────────────────────────────────────
  var courseList  = document.getElementById('courseList');
  var errorState  = document.getElementById('errorState');
  var errorMsg    = document.getElementById('errorMsg');
  var emptyState  = document.getElementById('emptyState');
  var pageTitle   = document.getElementById('pageTitle');
  var pageIcon    = document.getElementById('pageIcon');
  var pageIconUse = document.getElementById('pageIconUse');

  // ── State helpers ──────────────────────────────────────────
  function showSkeleton() {
    courseList.style.display = 'flex';
    errorState.style.display = 'none';
    emptyState.style.display = 'none';
    courseList.innerHTML =
      '<div class="skeleton skeleton-card"></div>' +
      '<div class="skeleton skeleton-card"></div>' +
      '<div class="skeleton skeleton-card"></div>';
  }

  function showError(msg) {
    courseList.style.display = 'none';
    errorState.style.display = '';
    emptyState.style.display = 'none';
    errorMsg.textContent = msg || '加载失败';
  }

  function showEmpty() {
    courseList.style.display = 'none';
    errorState.style.display = 'none';
    emptyState.style.display = '';
  }

  // ── Data helpers ───────────────────────────────────────────
  function getCategoryList(data) {
    if (Array.isArray(data)) return data;
    if (data && Array.isArray(data.categories)) return data.categories;
    if (data && Array.isArray(data.courses)) return data.courses;
    return [];
  }

  function findCategory(cats, id) {
    for (var i = 0; i < cats.length; i++) {
      if (String(cats[i]._id || cats[i].id || '') === id) return cats[i];
    }
    return null;
  }

  // ── Build HTML ─────────────────────────────────────────────
  function buildVideoCapsules(videos) {
    if (!videos || videos.length === 0) return '';

    // Preview mode: show placeholder instead of actual videos
    if (Auth.isPreview()) {
      return '<div class="video-capsules">' +
        '<div class="video-capsule" onclick="App.toast(\'预览模式，激活后可观看\')">' +
          '<div class="play-icon" style="background:var(--color-text-muted);"><svg><use href="#icon-lock"/></svg></div>' +
          '<div class="video-label" style="color:var(--color-text-muted);">' + videos.length + ' 个视频（激活后查看）</div>' +
        '</div>' +
        '</div>';
    }

    var html = '';
    for (var i = 0; i < videos.length; i++) {
      var vd = videos[i];
      var label = esc(vd.label || ('视频 ' + (i + 1)));
      var url = attr(vd.url || '');
      var pw = attr(vd.password || '');
      var onClick = url
        ? ("App.openVideo('" + url + "','" + pw + "')")
        : "App.toast('链接暂未上传')";

      var badgeHTML = '';
      if (vd.password) {
        badgeHTML = '<div class="password-badge" onclick="event.stopPropagation();App.copy(\'' + attr(vd.password) + '\')">' +
          '<svg width="12" height="12" style="margin-right:2px;display:inline;vertical-align:middle;"><use href="#icon-copy"/></svg>' +
          esc(vd.password) + '</div>';
      }

      html += '<div class="video-capsule" onclick="' + onClick + '">' +
        '<div class="play-icon"><svg><use href="#icon-play"/></svg></div>' +
        '<div class="video-label">' + label + '</div>' +
        badgeHTML + '</div>';
    }
    return '<div class="video-capsules">' + html + '</div>';
  }

  function buildCourseCard(course) {
    var title = esc(course.title || '未命名课程');
    var tag = course.tag || '';
    var tagHTML = tag
      ? '<span class="tag' + (tag === '必学' ? ' required' : '') + '">' + esc(tag) + '</span>'
      : '';
    var videoCount = (course.videos || []).length;
    var metaHTML = (tagHTML || videoCount > 0)
      ? '<div class="course-meta">' + tagHTML + (tagHTML && videoCount ? ' ' : '') + (videoCount ? videoCount + '个视频' : '') + '</div>'
      : '';

    var showCheck = Auth.isActivated() && typeof Progress !== 'undefined';
    var isDone = showCheck ? Progress.isDone(course.id) : false;
    return '<div class="course-card' + (isDone ? ' done' : '') + '">' +
      '<div class="course-header" onclick="event.stopPropagation();this.parentElement.classList.toggle(\'expanded\')">' +
        '<div class="course-icon"><svg><use href="#icon-play"/></svg></div>' +
        '<div class="course-info">' +
          '<div class="course-title">' + title + '</div>' +
          metaHTML +
        '</div>' +
        (showCheck ?
          '<button class="check-btn' + (isDone ? ' checked' : '') + '" onclick="event.stopPropagation();var c=this.closest(\'.course-card\');var done=Progress.toggle(\'' + attr(course.id) + '\');c.classList.toggle(\'done\',done);this.classList.toggle(\'checked\',done)" title="标记完成">' +
            (isDone ? '<svg><use href="#icon-check"/></svg>' : '') + '</button>' : '') +
        '<div class="expand-icon"><svg><use href="#icon-chevron-down"/></svg></div>' +
      '</div>' +
      buildVideoCapsules(course.videos || []) +
      '</div>';
  }

  function buildGroupCard(group) {
    var name = esc(group.name);
    var courses = (group.courses || []).slice().sort(function(a, b) { return (a.order || 0) - (b.order || 0); });
    var icon = (name === '理论母题') ? 'icon-book' : 'icon-edit';

    var innerHTML = '';
    for (var i = 0; i < courses.length; i++) {
      innerHTML += buildCourseCard(courses[i]);
    }

    return '<div class="course-card group-card">' +
      '<div class="course-header" onclick="event.stopPropagation();this.parentElement.classList.toggle(\'expanded\')">' +
        '<div class="course-icon" style="background:var(--color-primary);"><svg><use href="#' + icon + '"/></svg></div>' +
        '<div class="course-info">' +
          '<div class="course-title">' + name + '</div>' +
          '<div class="course-meta">' + courses.length + '门课</div>' +
        '</div>' +
        '<div class="expand-icon"><svg><use href="#icon-chevron-down"/></svg></div>' +
      '</div>' +
      '<div class="video-capsules group-courses">' + innerHTML + '</div>' +
      '</div>';
  }

  // ── Render ─────────────────────────────────────────────────
  function renderCourses(category) {
    var catName = category.name || category.title || '课程';
    var groups = category.groups || [];
    var flatCourses = category.courses || [];

    pageTitle.textContent = catName;
    pageIconUse.setAttribute('href', '#' + getCatIcon(catName));
    pageIcon.style.display = '';

    var total = groups.length > 0
      ? groups.reduce(function(s, g) { return s + (g.courses || []).length; }, 0)
      : flatCourses.length;

    if (total === 0) { showEmpty(); return; }

    courseList.style.display = 'flex';

    var html = '';
    if (groups.length > 0) {
      for (var g = 0; g < groups.length; g++) {
        html += buildGroupCard(groups[g]);
      }
    } else {
      for (var c = 0; c < flatCourses.length; c++) {
        html += buildCourseCard(flatCourses[c]);
      }
    }

    courseList.innerHTML = html;
  }

  // ── Load data ──────────────────────────────────────────────
  function loadCourses() {
    var catId = App.getParam('cat');
    if (!catId) { showError('缺少科目参数，请返回重试'); return; }
    showSkeleton();

    API.getCourses()
      .then(function (data) {
        var cats = getCategoryList(data);
        if (cats.length === 0) { showEmpty(); return; }
        var cat = findCategory(cats, catId);
        if (!cat) { showError('科目不存在，请返回重试'); return; }
        renderCourses(cat);
      })
      .catch(function (err) {
        showError(err.message || '加载失败，请返回重试');
      });
  }

  // ── Theme icon ─────────────────────────────────────────────
  window.updateThemeIcon = function() {
    var icon = document.getElementById('themeIcon');
    if (!icon) return;
    var use = icon.querySelector('use');
    var t = Theme.effective();
    if (t === 'dark') use.setAttribute('href', '#icon-moon');
    else if (t === 'light') use.setAttribute('href', '#icon-sun');
    else use.setAttribute('href', '#icon-sun');
  };
  updateThemeIcon();

  // ── Go ─────────────────────────────────────────────────────
  loadCourses();

})();
</script>

</body>
</html>
