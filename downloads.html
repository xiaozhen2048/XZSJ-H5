  <!-- 9. icon-chart: Bar chart -->

  <!-- 13. icon-book: Book -->
  <symbol id="icon-book" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

  <!-- 14. icon-user: User -->

  <!-- 18. icon-settings: Settings/gear -->

    <circle cx="12" cy="12" r="3"/>
    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
  </symbol>

  <!-- 19. icon-download: Download -->
  <symbol id="icon-download" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

    <polyline points="7 10 12 15 17 10"/>
    <line x1="12" y1="15" x2="12" y2="3"/>
  </symbol>

  <!-- 20. icon-external: External link -->
  <symbol id="icon-external" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
    <polyline points="15 3 21 3 21 9"/>
    <line x1="10" y1="14" x2="21" y2="3"/>

  <!-- 21. icon-check: Checkmark -->
  <symbol id="icon-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="20 6 9 17 4 12"/>
  </symbol>

  <!-- 22. icon-x: X/close -->
  <symbol id="icon-x" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="18" y1="6" x2="6" y2="18"/>
    <line x1="6" y1="6" x2="18" y2="18"/>
  </symbol>

  <!-- 23. icon-sun: Sun -->
  <symbol id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="5"/>
    <line x1="12" y1="1" x2="12" y2="3"/>
    <line x1="12" y1="21" x2="12" y2="23"/>
    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
    <line x1="1" y1="12" x2="3" y2="12"/>
    <line x1="21" y1="12" x2="23" y2="12"/>
    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>

  <!-- 24. icon-moon: Moon -->
  <symbol id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
  </symbol>

</svg>


<!-- Sticky Page Header -->
<div class="page-header">
  <a href="home.html" class="back-btn">
    <svg><use href="#icon-arrow-left"/></svg>
  </a>
  <div class="title">讲义下载</div>
</div>

<!-- Page Content -->
<div class="page-content">

  <!-- Baidu Wangpan Section -->
  <div id="wangpanSection" style="display:none;">
    <div class="section-title">百度网盘</div>
    <div id="wangpanCard" style="background:var(--color-surface);border-radius:var(--radius-md);padding:var(--space-lg);box-shadow:var(--shadow-card);margin-bottom:var(--space-xl);">
      <div style="display:flex;align-items:flex-start;gap:var(--space-md);">
        <div style="flex-shrink:0;width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:var(--color-primary-light);border-radius:var(--radius-sm);">
          <svg width="24" height="24" style="fill:var(--color-primary-dark);"><use href="#icon-download"/></svg>
        </div>
        <div style="flex:1;min-width:0;">
          <div id="wangpanLink" style="font-size:var(--font-size-sm);color:var(--color-text-secondary);word-break:break-all;margin-bottom:var(--space-sm);"></div>
          <div style="display:flex;align-items:center;gap:var(--space-sm);margin-bottom:var(--space-md);">
            <span style="font-size:var(--font-size-xs);color:var(--color-text-muted);">提取码：</span>
            <span id="wangpanCode" style="font-family:monospace;font-size:var(--font-size-md);font-weight:var(--font-weight-semibold);background:var(--color-tag-bg);padding:4px 10px;border-radius:var(--radius-sm);letter-spacing:0.1em;"></span>
            <button id="copyCodeBtn" style="display:inline-flex;align-items:center;justify-content:center;width:var(--touch-target);height:36px;border-radius:var(--radius-sm);border:1px solid var(--color-border);background:var(--color-surface);cursor:pointer;transition:background var(--transition-fast);">
              <svg width="16" height="16" style="fill:var(--color-text-secondary);"><use href="#icon-copy"/></svg>
            </button>
          </div>
          <button id="openWangpanBtn" class="btn btn-primary btn-sm" style="display:inline-flex;align-items:center;gap:6px;">
            <svg width="16" height="16" style="fill:currentColor;"><use href="#icon-external"/></svg>
            打开百度网盘
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Cloud Storage Section -->
  <div id="cloudSection" style="display:none;">
    <div class="section-title">云存储</div>
    <div id="cloudFiles" style="display:flex;flex-direction:column;gap:var(--space-sm);margin-bottom:var(--space-xl);"></div>
  </div>

  <!-- Skeleton -->
  <div id="skeletonState">
    <div class="skeleton skeleton-card" style="margin-bottom:var(--space-md);"></div>
    <div class="skeleton skeleton-card"></div>
  </div>

  <!-- Error State -->
  <div id="errorState" style="display:none;text-align:center;padding:var(--space-3xl) var(--space-lg);">
    <p id="errorMsg" style="color:var(--color-text-secondary);margin-bottom:var(--space-lg);line-height:1.5;"></p>
    <button class="btn btn-outline btn-sm" id="retryBtn">重试</button>
  </div>

  <!-- Empty State -->
  <div id="emptyState" style="display:none;text-align:center;padding:var(--space-3xl) var(--space-lg);">
    <p style="color:var(--color-text-muted);">讲义暂未上传</p>
  </div>

</div>

<script src="js/config.js?v=1780587475"></script>
<script src="js/theme.js?v=1780587475"></script>
<script src="js/api.js?v=1780587475"></script>
<script src="js/auth.js?v=1780587475"></script>
<script src="js/app.js?v=1780587475"></script>

<script>
(function () {
  'use strict';

  function escapeHTML(str) {
    if (!str) return '';
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  // DOM references
  var wangpanSection = document.getElementById('wangpanSection');
  var wangpanLink    = document.getElementById('wangpanLink');
  var wangpanCode    = document.getElementById('wangpanCode');
  var copyCodeBtn    = document.getElementById('copyCodeBtn');
  var openWangpanBtn = document.getElementById('openWangpanBtn');
  var cloudSection   = document.getElementById('cloudSection');
  var cloudFiles     = document.getElementById('cloudFiles');
  var skeletonState  = document.getElementById('skeletonState');
  var errorState     = document.getElementById('errorState');
  var errorMsg       = document.getElementById('errorMsg');
  var emptyState     = document.getElementById('emptyState');
  var retryBtn       = document.getElementById('retryBtn');

  var currentBaiduUrl = '';

  function showSkeleton() {
    skeletonState.style.display = '';
    wangpanSection.style.display = 'none';
    cloudSection.style.display = 'none';
    errorState.style.display = 'none';
    emptyState.style.display = 'none';
  }

  function hideSkeleton() {
    skeletonState.style.display = 'none';
  }

  function showError(msg) {
    skeletonState.style.display = 'none';
    wangpanSection.style.display = 'none';
    cloudSection.style.display = 'none';
    errorState.style.display = '';
    emptyState.style.display = 'none';
    errorMsg.textContent = msg || '加载失败，请检查网络连接';
  }

  function showEmpty() {
    skeletonState.style.display = 'none';
    wangpanSection.style.display = 'none';
    cloudSection.style.display = 'none';
    errorState.style.display = 'none';
    emptyState.style.display = '';
  }

  function renderDownloads(downloads) {
    hideSkeleton();

    var hasBaidu = downloads && downloads.baidu && downloads.baidu.url;
    var hasCloud = downloads && downloads.cloud && Array.isArray(downloads.cloud.files) && downloads.cloud.files.length > 0;

    if (!hasBaidu && !hasCloud) {
      showEmpty();
      return;
    }

    // Render Baidu Wangpan
    if (hasBaidu) {
      var baidu = downloads.baidu;
      currentBaiduUrl = baidu.url;
      wangpanLink.textContent = baidu.url;
      wangpanCode.textContent = baidu.code || '';
      wangpanSection.style.display = '';
    }

    // Render Cloud storage
    if (hasCloud) {
      var files = downloads.cloud.files;
      cloudFiles.innerHTML = '';

      for (var i = 0; i < files.length; i++) {
        var file = files[i];
        var fileName = file.name || file.title || '未命名文件';
        var fileUrl = file.url || '';

        var fileRow = document.createElement('div');
        fileRow.style.cssText =
          'display:flex;align-items:center;gap:var(--space-md);' +
          'background:var(--color-surface);border-radius:var(--radius-md);' +
          'padding:var(--space-md) var(--space-lg);box-shadow:var(--shadow-card);' +
          'cursor:pointer;transition:transform var(--transition-fast);';

        fileRow.addEventListener('click', (function (url) {
          return function () {
            if (!url) {
              App.toast('链接暂未上传');
              return;
            }
            window.open(url, '_blank');
          };
        })(fileUrl));

        fileRow.addEventListener('mousedown', function () {
          this.style.transform = 'scale(0.98)';
        });
        fileRow.addEventListener('mouseup', function () {
          this.style.transform = '';
        });
        fileRow.addEventListener('mouseleave', function () {
          this.style.transform = '';
        });

        fileRow.innerHTML =
          '<div style="width:40px;height:40px;display:flex;align-items:center;justify-content:center;' +
          'background:var(--color-primary-light);border-radius:var(--radius-sm);flex-shrink:0;">' +
            '<svg width="22" height="22" style="fill:var(--color-primary-dark);">' +
              '<use href="#icon-file"/>' +
            '</svg>' +
          '</div>' +
          '<div style="flex:1;min-width:0;font-size:var(--font-size-sm);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' +
            escapeHTML(fileName) +
          '</div>' +
          '<div style="flex-shrink:0;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);">' +
            '<svg width="20" height="20" style="fill:var(--color-primary);">' +
              '<use href="#icon-download"/>' +
            '</svg>' +
          '</div>';

        cloudFiles.appendChild(fileRow);
      }

      cloudSection.style.display = '';
    }
  }

  function loadDownloads() {
    showSkeleton();

    API.getCourses()
      .then(function (data) {
        var downloads = (data && data.downloads) ? data.downloads : null;
        renderDownloads(downloads);
      })
      .catch(function (err) {
        hideSkeleton();
        showError(err.message || '加载失败，请检查网络连接');
      });
  }

  // Copy extraction code
  copyCodeBtn.addEventListener('click', function () {
    var code = wangpanCode.textContent;
    if (code) App.copy(code);
  });

  // Open Baidu Wangpan
  openWangpanBtn.addEventListener('click', function () {
    if (currentBaiduUrl) {
      window.open(currentBaiduUrl, '_blank');
    }
  });

  // Retry
  retryBtn.addEventListener('click', function () {
    loadDownloads();
  });

  loadDownloads();

})();
</script>

</body>
</html>
