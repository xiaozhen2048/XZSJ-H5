<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>重置管理员密码</title>
<style>
body { font-family: sans-serif; max-width: 400px; margin: 50px auto; padding: 20px; }
input, button { display: block; width: 100%; padding: 12px; margin: 10px 0; font-size: 16px; box-sizing: border-box; }
button { background: #B8A9B4; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
#msg { margin-top: 15px; padding: 10px; border-radius: 8px; }
.success { background: #e8f5e9; color: #2e7d32; }
.error { background: #fdecea; color: #c62828; }
</style>
</head>
<body>
<h2>重置管理员密码</h2>
<input type="text" id="pwd" placeholder="输入新密码" value="admin123">
<button onclick="resetPwd()">重置密码</button>
<div id="msg"></div>

<script>
async function resetPwd() {
  var msg = document.getElementById('msg');
  var pwd = document.getElementById('pwd').value || 'admin123';
  msg.className = '';
  msg.textContent = '正在重置...';
  try {
    var res = await fetch('/api/admin/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ password: 'x', _reset: 'true', newPassword: pwd })
    });
    var data = await res.json();
    if (data.success) {
      msg.className = 'success';
      msg.textContent = '密码已重置为：' + pwd;
    } else {
      msg.className = 'error';
      msg.textContent = '失败：' + (data.error || '未知错误');
    }
  } catch(e) {
    msg.className = 'error';
    msg.textContent = '请求失败：' + e.message;
  }
}
</script>
</body>
</html>
