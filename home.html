<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>小镇刷题家 — 首页</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Header Bar -->
<div class="header-bar">
  <div class="brand">小镇刷题家</div>
  <div class="tagline">江苏专用 · 数资判系统课程</div>
</div>

<!-- Preview Banner -->
<div id="previewBanner" style="display:none;background:var(--color-accent-light);color:var(--color-text);text-align:center;padding:var(--space-md) var(--space-lg);font-size:var(--font-size-sm);line-height:1.4;">
  当前为预览模式，激活后可查看完整内容
</div>

<!-- Page Content -->
<div class="page-content">

  <!-- Subject Grid -->
  <div class="subject-grid" id="subjectGrid">
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-card"></div>
  </div>

  <!-- Error State -->
  <div id="errorState" style="display:none;text-align:center;padding:var(--space-3xl) var(--space-lg);">
    <p id="errorMsg" style="color:var(--color-text-secondary);margin-bottom:var(--space-lg);line-height:1.5;"></p>
    <button class="btn btn-outline btn-sm" id="retryBtn">重试</button>
  </div>

  <!-- Empty State -->
  <div id="emptyState" style="display:none;text-align:center;padding:var(--space-3xl) var(--space-lg);">
    <p style="color:var(--color-text-muted);">暂无课程，请联系博主</p>
  </div>

  <!-- Section Title -->
  <div class="section-title" style="margin-top:var(--space-2xl);">快捷入口</div>

  <!-- Quick Actions Row -->
  <div class="quick-actions">
    <a href="downloads.html" class="quick-action">
      <svg><use href="assets/icons.svg#icon-download"/></svg>
      <span class="quick-action-label">讲义下载</span>
    </a>
    <a href="method.html" class="quick-action">
      <svg><use href="assets/icons.svg#icon-book"/></svg>
      <span class="quick-action-label">学习方法</span>
    </a>
    <a href="profile.html" class="quick-action">
      <svg><use href="assets/icons.svg#icon-user"/></svg>
      <span class="quick-action-label">我的</span>
    </a>
  </div>

</div>

<script src="js/config.js"></script>
<script src="js/theme.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>

<script>
(function () {
  'use strict';

  /*
   * Escape HTML special characters to prevent XSS.
   * Creates a text node to leverage the browser's built-in escaping.
   */
  function escapeHTML(str) {
    if (!str) return '';
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  /*
   * Map a category title to its corresponding SVG icon name.
   *   "数量" -> icon-math
   *   "资料" -> icon-chart
   *   "判断" -> icon-brain
   *   all others -> icon-mic
   */
  function getCategoryIcon(title) {
    var t = title || '';
    if (t.indexOf('数量') !== -1) return 'icon-math';
    if (t.indexOf('资料') !== -1) return 'icon-chart';
    if (t.indexOf('判断') !== -1) return 'icon-brain';
    return 'icon-mic';
  }

  /*
   * Color palette used when the API response does not include a color field.
   * Each card cycles through this palette for its accent border.
   */
  var colorPalette = [
    '#B8A9B4', '#A0B0BB', '#8FA88F', '#C4908A',
    '#8899AA', '#C5BAB0', '#BBC8D4', '#D4C5C7'
  ];

  function getPaletteColor(index) {
    return colorPalette[index % colorPalette.length];
  }

  // -----------------------------------------------------------------------
  // DOM references
  // -----------------------------------------------------------------------
  var subjectGrid  = document.getElementById('subjectGrid');
  var errorState   = document.getElementById('errorState');
  var errorMsg     = document.getElementById('errorMsg');
  var emptyState   = document.getElementById('emptyState');
  var retryBtn     = document.getElementById('retryBtn');
  var previewBanner = document.getElementById('previewBanner');

  // -----------------------------------------------------------------------
  // Preview banner
  // -----------------------------------------------------------------------
  if (Auth.isPreview()) {
    previewBanner.style.display = 'block';
  }

  // -----------------------------------------------------------------------
  // State management: skeleton / error / empty / content
  // -----------------------------------------------------------------------
  function showSkeleton() {
    subjectGrid.style.display = '';
    errorState.style.display = 'none';
    emptyState.style.display = 'none';

    subjectGrid.innerHTML = '';
    for (var i = 0; i < 4; i++) {
      var skel = document.createElement('div');
      skel.className = 'skeleton skeleton-card';
      subjectGrid.appendChild(skel);
    }
  }

  function hideSkeleton() {
    subjectGrid.innerHTML = '';
  }

  function showError(msg) {
    subjectGrid.style.display = 'none';
    errorState.style.display = '';
    emptyState.style.display = 'none';
    errorMsg.textContent = msg || '加载失败，请检查网络连接';
  }

  function showEmpty() {
    subjectGrid.style.display = 'none';
    errorState.style.display = 'none';
    emptyState.style.display = '';
  }

  // -----------------------------------------------------------------------
  // Render subject cards
  // -----------------------------------------------------------------------
  function renderCards(categories) {
    subjectGrid.style.display = '';
    subjectGrid.innerHTML = '';

    for (var i = 0; i < categories.length; i++) {
      var cat = categories[i];

      // Normalize fields
      var courseId   = cat.id || cat._id || '';
      var title      = cat.name || cat.title || '未命名';
      var desc       = cat.description || cat.desc || '';
      var count      = (cat.courses || []).length || 0;
      var color      = cat.color || getPaletteColor(i);
      var iconName   = getCategoryIcon(title);

      // Build description text
      var descText = '';
      if (desc) {
        descText = desc;
      } else if (count > 0) {
        descText = count + ' 个课程';
      }

      var card = document.createElement('a');
      card.className = 'subject-card';
      card.href = 'course.html?cat=' + encodeURIComponent(courseId);

      // Custom accent border color (mobile: left, tablet+: top)
      card.style.borderLeftColor = color;
      card.style.borderTopColor = color;

      card.innerHTML =
        '<div class="card-icon">' +
          '<svg><use href="assets/icons.svg#' + iconName + '"/></svg>' +
        '</div>' +
        '<div class="card-body">' +
          '<div class="card-title">' + escapeHTML(title) + '</div>' +
          (descText ? '<div class="card-desc">' + escapeHTML(descText) + '</div>' : '') +
        '</div>' +
        '<div class="card-arrow">' +
          '<svg><use href="assets/icons.svg#icon-chevron-right"/></svg>' +
        '</div>';

      subjectGrid.appendChild(card);
    }
  }

  // -----------------------------------------------------------------------
  // Fetch courses from API
  // -----------------------------------------------------------------------
  function loadCourses() {
    showSkeleton();

    API.getCourses()
      .then(function (data) {
        // The API may return an array directly or wrap in an object
        var categories = data && data.categories ? data.categories : [];

        hideSkeleton();

        if (categories.length === 0) {
          showEmpty();
          return;
        }

        renderCards(categories);
      })
      .catch(function (err) {
        hideSkeleton();
        showError(err.message || '加载失败，请检查网络连接');
      });
  }

  // -----------------------------------------------------------------------
  // Retry button
  // -----------------------------------------------------------------------
  retryBtn.addEventListener('click', function () {
    loadCourses();
  });

  // -----------------------------------------------------------------------
  // Initialize
  // -----------------------------------------------------------------------
  // Auth guard is handled by App.init() which runs on DOMContentLoaded.
  // We load data immediately; the auth redirect (if needed) will win the race.
  loadCourses();

})();
</script>

</body>
</html>
