<!-- Sticky Page Header -->
<div class="page-header">

<!-- Page Content -->
<div class="page-content">

  <!-- Activation Info Card -->
  <div class="section-title">激活信息</div>
  <div id="activationCard" style="background:var(--color-surface);border-radius:var(--radius-md);padding:var(--space-lg);box-shadow:var(--shadow-card);margin-bottom:var(--space-xl);">
    <div style="display:flex;align-items:center;gap:var(--space-md);">
      <div style="flex-shrink:0;width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:#E8F0E8;border-radius:var(--radius-sm);">
        <svg width="24" height="24" style="fill:var(--color-success);"><use href="#icon-check"/></svg>
      </div>
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:var(--space-sm);margin-bottom:4px;">
          <span style="font-size:var(--font-size-sm);font-weight:var(--font-weight-semibold);">已激活</span>
          <span style="display:inline-block;background:#E8F0E8;color:var(--color-success);font-size:var(--font-size-xs);padding:1px 8px;border-radius:var(--radius-full);">会员</span>
        </div>
        <div id="activationCode" style="font-family:monospace;font-size:var(--font-size-xs);letter-spacing:0.05em;word-break:break-all;color:var(--color-text-secondary);"></div>
        <div id="activationDate" style="font-size:var(--font-size-xs);color:var(--color-text-muted);margin-top:2px;"></div>
      </div>
    </div>
  </div>

  <!-- Preview Banner -->
  <div id="previewWarning" style="display:none;background:var(--color-tag-bg);border-radius:var(--radius-md);padding:var(--space-md) var(--space-lg);margin-bottom:var(--space-xl);text-align:center;font-size:var(--font-size-sm);color:var(--color-text-secondary);">
    当前为预览模式，激活后可使用全部功能
  </div>

  <!-- Feedback Section -->
  <div class="section-title">反馈建议</div>
  <div style="background:var(--color-surface);border-radius:var(--radius-md);padding:var(--space-lg);box-shadow:var(--shadow-card);margin-bottom:var(--space-xl);">
    <textarea id="feedbackInput" class="form-input" rows="3" placeholder="有什么建议或问题？告诉我~" style="margin-bottom:var(--space-md);resize:vertical;"></textarea>
    <button id="feedbackSubmit" class="btn btn-primary btn-block">提交反馈</button>
    <div id="feedbackMsg" style="display:none;text-align:center;margin-top:var(--space-sm);font-size:var(--font-size-xs);"></div>
  </div>

  <!-- Logout Button -->
  <button id="logoutBtn" class="btn btn-danger btn-block">退出登录</button>

</div>

<script src="js/config.js?v=1780587475"></script>
<script src="js/theme.js?v=1780587475"></script>
<script src="js/api.js?v=1780587475"></script>
<script src="js/auth.js?v=1780587475"></script>
<script src="js/app.js?v=1780587475"></script>

<script>
(function () {
  'use strict';

  function escapeHTML(str) {
    if (!str) return '';
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  // DOM references
  var activationCode = document.getElementById('activationCode');
  var activationDate = document.getElementById('activationDate');
  var previewWarning = document.getElementById('previewWarning');
  var logoutBtn      = document.getElementById('logoutBtn');

  // Populate activation info
  function renderActivation() {
    if (Auth.isPreview()) {
      previewWarning.style.display = '';
      activationCode.textContent = '未激活';
      activationDate.textContent = '激活后可查看完整内容';
      return;
    }

    var code = Auth.getCode();
    if (code) {
      // Format code as XXXX-XXXX-XXXX
      var formatted = code;
      if (code.length >= 8 && code.indexOf('-') === -1) {
        formatted = code.slice(0, 4) + '-' + code.slice(4, 8);
        if (code.length > 8) formatted += '-' + code.slice(8, 12);
      }
      activationCode.textContent = formatted;
    } else {
      activationCode.textContent = '未知';
    }

    try {
      var data = JSON.parse(
        localStorage.getItem(window.APP_CONFIG.STORAGE_KEYS.ACTIVATION) || '{}'
      );
      var at = data.activatedAt;
      if (at) {
        var d = new Date(at);
        activationDate.textContent = '激活时间：' +
          d.getFullYear() + '-' +
          String(d.getMonth() + 1).padStart(2, '0') + '-' +
          String(d.getDate()).padStart(2, '0');
      } else {
        activationDate.textContent = '';
      }
    } catch (e) {
      activationDate.textContent = '';
    }
  }

  // Logout handler

  // Feedback
  var feedbackInput = document.getElementById('feedbackInput');
  var feedbackSubmit = document.getElementById('feedbackSubmit');
  var feedbackMsg = document.getElementById('feedbackMsg');

  feedbackSubmit.addEventListener('click', function() {
    var text = feedbackInput.value.trim();
    if (!text) { App.toast('请输入反馈内容'); return; }
    feedbackSubmit.disabled = true;
    feedbackSubmit.textContent = '提交中...';
    API.submitFeedback(text)
      .then(function() {
        feedbackInput.value = '';
        feedbackMsg.style.display = '';
        feedbackMsg.textContent = '感谢反馈！';
        feedbackMsg.style.color = 'var(--color-success)';
      })
      .catch(function(err) {
        feedbackMsg.style.display = '';
        feedbackMsg.textContent = err.message || '提交失败';
        feedbackMsg.style.color = 'var(--color-danger)';
      })
      .finally(function() {
        feedbackSubmit.disabled = false;
        feedbackSubmit.textContent = '提交反馈';
      });
  });

  // Logout handler
  logoutBtn.addEventListener('click', function () {
    Auth.logout();
  });

  renderActivation();

})();
</script>

</body>
</html>
